<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Serviço</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/pagina-servicos.css') }}">
</head>
<body>
{% include "components/header.html" %}

<main class="area-servicos">
    <section class="lista-servicos">
    </section>

    <aside class="painel-lateral">
        <div class="detalhe-container">
            <section class="info-servico">
                <h2>{{servico.nome}}</h2>
                <p>{{servico.descricao}}</p>
                <p class="localizacao">{{servico.cidade}}-{{servico.estado}}</p>
                <!--                <span class="preco">R$ 150,00</span>-->
            </section>

            <aside class="info-prestador">
                <div class="perfil-upload">

                    <img id="previewFoto"
                         src="{{ prestador.foto_perfil if prestador.foto_perfil else 'https://thumbs.dreamstime.com/b/perfil-de-usu%C3%A1rio-do-vetor-avatar-padr%C3%A3o-179376714.jpg' }}"
                         alt="Foto de perfil">
                </div>
                <h3 style="text-transform:uppercase;">{{prestador.nome}}</h3>
                <a href="tel:{{ servico.telefone }}" class="btn-contratar">Contratar serviço</a>
            </aside>
        </div>
    </aside>
</main>


<footer class="site-footer">
    <p>&copy; 2025 Workes. Todos os direitos reservados.</p>
</footer>
</body>
</html>
