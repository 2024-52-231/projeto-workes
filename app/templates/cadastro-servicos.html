<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Serviços</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style-cadastro-servico.css') }}">
</head>
<body>

<header class="header">

    <h1>Cadastro de Serviços</h1>
    <a href="{{url_for('index')}}" class="btn-back">Voltar</a>
</header>

<main class="form-card">
    <h2>Informe as seguintes informações para concluir o cadastro:</h2>

    <form method="post">
        <div class="form-group">
            <input type="text" name="nome" placeholder="Nome do serviço" required>
        </div>

        <div class="section-title">Endereço</div>

        <div class="form-group">
            <input type="text" id="cep" name="cep" placeholder="CEP" required>
        </div>

        <div class="form-group">
            <input type="text" id="log" name="logradouro" placeholder="Logradouro" required>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group">
                <input type="text" name="cidade" id="cidade" placeholder="Cidade" required>
            </div>
            <div class="form-group">
                <input type="text" name="uf" id="uf" placeholder="Estado" required>
            </div>
        </div>

        <div class="form-group">
            <input type="text" name="numero" placeholder="Número" required>
        </div>

        <div class="form-group">
            <label>Telefone:</label>
            <input type="tel" name="telefone" id="telefone" placeholder="(00) 00000-0000" required>
        </div>

        <div class="form-group">
            <label>Link (site, instagram, whatsapp):</label>
            <input type="url" name="link" placeholder="https://...">
        </div>

        <div class="form-group">
            <textarea rows="4" name="descricao" placeholder="Descrição" required></textarea>
        </div>

        <button type="submit" class="btn-submit">Cadastrar</button>
    </form>
    </form>

    {% if sucesso %}
    <div id="modal-sucesso" class="modal-overlay" style="display: flex;">
        <div class="modal-content" style="display: block;">
            <span class="close-button" onclick="fecharModal()">&times;</span>
            <div class="icon-check">✅</div>
            <h2>Sucesso!</h2>
            <p>{{ sucesso }}</p>
            <button class="btn-ok" type="button" onclick="fecharModal()">OK</button>
        </div>
    </div>
    {% endif %}
</main>
<script src="https://unpkg.com/imask"></script>
<script src="{{ url_for('static', filename='js/mascaras.js') }}"></script>
<script src="{{ url_for('static', filename='js/buscaCEP.js') }}"></script>
<script>
    function fecharModal() {
        const modal = document.getElementById('modal-sucesso');
        if (modal) {
            modal.style.display = 'none';
        }
    }

    {% if sucesso %}
        setTimeout(fecharModal, 3000);
    {% endif %}
</script>
</body>
</html>
